<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стасян Music | Spotify Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* Тёмная тема по умолчанию (как в Spotify) */
        :root {
            --bg-gradient: radial-gradient(circle at 10% 30%, #1a1e2b, #0a0c14);
            --player-bg: rgba(18, 18, 18, 0.95);
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --track-bg: rgba(40, 40, 40, 0.8);
            --track-border: #2a2a2a;
            --accent: #1db954;
            --accent-hover: #1ed760;
            --accent-glow: rgba(29, 185, 84, 0.3);
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            --playlist-bg: rgba(30, 30, 30, 0.9);
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-effect: rgba(255, 255, 255, 0.03);
        }

        /* Светлая тема (для контраста) */
        [data-theme="light"] {
            --bg-gradient: radial-gradient(circle at 10% 30%, #e0e7ff, #c7d2fe);
            --player-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --track-bg: #f8fafc;
            --track-border: #e2e8f0;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.3);
            --shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
            --playlist-bg: #f1f5f9;
            --card-bg: rgba(0, 0, 0, 0.02);
            --glass-effect: rgba(255, 255, 255, 0.8);
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.5s ease;
        }

        .player {
            background: var(--player-bg);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 35px;
            box-shadow: var(--shadow);
            max-width: 1000px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .title-section h1 {
            font-size: 3em;
            background: linear-gradient(135deg, #1db954, #1ed760, #1db954);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s linear infinite;
            letter-spacing: -1px;
            font-weight: 800;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .title-section .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
            margin-top: 5px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .theme-switch {
            background: var(--card-bg);
            border-radius: 60px;
            padding: 5px;
            display: flex;
            gap: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .theme-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95em;
            background: transparent;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .theme-btn.active {
            background: var(--accent);
            color: black;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* Плейлисты - как в Spotify */
        .playlists {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .playlist-btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex: 1;
            min-width: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .playlist-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.7s ease;
        }

        .playlist-btn:hover::before {
            left: 100%;
        }

        .playlist-btn:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .playlist-btn.active {
            background: var(--accent);
            color: black;
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .playlist-emoji {
            font-size: 1.3em;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        /* Список треков */
        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 30px 0;
            max-height: 450px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .track-list::-webkit-scrollbar {
            width: 8px;
        }

        .track-list::-webkit-scrollbar-track {
            background: var(--card-bg);
            border-radius: 10px;
        }

        .track-list::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 10px;
            box-shadow: inset 0 0 6px rgba(0,0,0,0.3);
        }

        .track-item {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            cursor: pointer;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .track-item:hover {
            border-color: var(--accent);
            transform: translateX(8px) scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: linear-gradient(90deg, var(--card-bg), var(--glass-effect));
        }

        .track-cover {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #1db954, #1ed760);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            color: black;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .track-item:hover .track-cover {
            transform: rotate(5deg) scale(1.05);
        }

        .track-info {
            flex: 1;
        }

        .track-name {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .track-artist {
            color: var(--text-secondary);
            font-size: 0.95em;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border: none;
            background: var(--accent);
            color: black;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 5px 20px var(--accent-glow);
            position: relative;
            overflow: hidden;
        }

        .play-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .play-btn:hover::after {
            width: 100%;
            height: 100%;
        }

        .play-btn:hover {
            transform: scale(1.15);
            background: var(--accent-hover);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .play-btn.playing {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--accent-glow); }
            70% { box-shadow: 0 0 0 15px rgba(29, 185, 84, 0);; }
            100% { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0);; }
        }

        /* Секция плеера */
        .player-section {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 25px;
            margin: 25px 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .now-playing-cover {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #1db954, #1ed760);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .now-playing-info {
            flex: 1;
        }

        .now-playing-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .now-playing-title {
            font-size: 1.6em;
            font-weight: bold;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .now-playing-artist {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        audio {
            width: 100%;
            margin-top: 15px;
            border-radius: 30px;
            background: var(--card-bg);
        }

        audio::-webkit-media-controls-panel {
            background: var(--accent);
            color: black;
        }

        audio::-webkit-media-controls-play-button {
            background-color: white;
            border-radius: 50%;
        }

        /* Футер */
        .footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.95em;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            letter-spacing: 0.5px;
        }

        /* Анимация загрузки */
        .loading {
            animation: shimmer 1.5s infinite;
            background: linear-gradient(90deg, var(--card-bg) 25%, var(--track-bg) 50%, var(--card-bg) 75%);
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="player">
        <div class="header">
            <div class="title-section">
                <h1>🗿 СТАСЯН</h1>
                <div class="subtitle">spotify style · official</div>
            </div>
            <div class="theme-switch">
                <button class="theme-btn" onclick="setTheme('dark')">🌙 Тёмная</button>
                <button class="theme-btn active" onclick="setTheme('light')">☀️ Светлая</button>
            </div>
        </div>

        <!-- Плейлисты -->
        <div class="playlists">
            <button class="playlist-btn active" onclick="loadPlaylist('rock')">
                <span class="playlist-emoji">🎸</span>
                Рок-н-ролл
            </button>
            <button class="playlist-btn" onclick="loadPlaylist('anonym')">
                <span class="playlist-emoji">👤</span>
                Анонимный эмбер
            </button>
            <button class="playlist-btn" onclick="loadPlaylist('morgenshtern')">
                <span class="playlist-emoji">💰</span>
                Morgenshtern
            </button>
            <button class="playlist-btn" onclick="loadPlaylist('djstas')">
                <span class="playlist-emoji">🎧</span>
                DJ Stas 2007 feat
            </button>
        </div>

        <!-- Список треков -->
        <div class="track-list" id="trackList">
            <!-- Треки будут тут -->
        </div>

        <!-- Плеер -->
        <div class="player-section">
            <div class="now-playing">
                <div class="now-playing-cover" id="nowPlayingCover">🎵</div>
                <div class="now-playing-info">
                    <div class="now-playing-label">CURRENTLY PLAYING</div>
                    <div class="now-playing-title" id="nowPlayingTitle">—</div>
                    <div class="now-playing-artist" id="nowPlayingArtist">Стасян Music</div>
                </div>
            </div>
            <audio id="audioPlayer" controls>
                <source src="" type="audio/mpeg">
            </audio>
        </div>

        <div class="footer">
            🎧 made by stasyan · 2007 · forever
        </div>
    </div>

    <script>
        // ТВОИ ТРЕКИ - ВСЁ РАБОТАЕТ!
        const playlists = {
            rock: [
                { name: "Парти", artist: "Стасян", url: "https://www.dropbox.com/scl/fi/v0rt7vw1wp50hephez9a7/Teen-Mortgage-Party-www.lightaudio.ru.mp3?rlkey=zv1ds8o6f9gfoz838evpm7z96&st=8m611iie&dl=1", emoji: "🎸" },
                { name: "SWAT", artist: "Стасян feat. Рок", url: "https://www.dropbox.com/scl/fi/dfgizaihhpa8mld2or6rq/Teen-Mortgage-S.W.A.S.-www.lightaudio.ru.mp3?rlkey=g0k4f9k37d1f816h1s7cy3h0j&st=o8rxk9gk&dl=1", emoji: "🤘" },
                { name: "Ride", artist: "Стасян", url: "https://www.dropbox.com/scl/fi/a3x8mvfu5lfk4onxwaeqw/Teen-Mortgage-Ride-www.lightaudio.ru.mp3?rlkey=e5snrrhcpg41xgkxn302fqanp&st=iarc5w5k&dl=1", emoji: "⚡" }
            ],
            anonym: [
                { name: "Никни МанАдж", artist: "Эмбер", url: "https://www.dropbox.com/scl/fi/2w9o1j5jh40bj97qhcxzx/Anonymous_Ember_-_NICKI_MINAJ_79565434.mp3?rlkey=lwye2iepdzghc6y08tjkj5lzl&st=qzanf80m&dl=1", emoji: "👤" },
                { name: "В тени", artist: "Эмбер", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3", emoji: "🌑" },
                { name: "Неизвестный", artist: "Эмбер", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3", emoji: "🎭" }
            ],
            morgenshtern: [
                { name: "Кадилак", artist: "Morgenshtern", url: "https://www.dropbox.com/scl/fi/ezyqogrcq4y6wpri5wejl/morgenshtern_-_Cadillac_BASSBOOSTED_70063881.mp3?rlkey=vnxbmsj9b46sx5ucy126ne6fi&st=tvp02d4j&dl=1", emoji: "💰" },
                { name: "Айс", artist: "Morgenshtern", url: "https://www.dropbox.com/scl/fi/cljxrt92g9qtqhoay3zue/morgenshtern_-_ICE_BASS_BOOSTED_70642494.mp3?rlkey=p2ww93xvllyyztd1sbapscxvn&st=myfv81fi&dl=1", emoji: "❄️" },
                { name: "Красное вино фристайл", artist: "Morgenshtern", url: "https://www.dropbox.com/scl/fi/d3lzg3m21wjp1au0bwrkr/MORGENSHTERN_Frame_Tamer_-_KRASNOE_VINO_RISTAJJL_Bassboost_by_Xle8_68886725.mp3?rlkey=mln88gwu4wi5rkg5bokytfjnz&st=f1c3xaga&dl=1", emoji: "🔥" }
            ],
            djstas: [
                { name: "2007 forever", artist: "DJ Stas feat. Стасян)", url: "https://www.dropbox.com/scl/fi/9gx0pymzdnkk5zpq6h60g/dj_stas_2007_-_dj_stas_2007_obyavlyaetsya_SUETA_76789045.mp3?rlkey=1ojm8nuf76fc1ermi0ji8jz0f&st=2e2tygbq&dl=1", emoji: "🎧" }
            ]
        };

        let currentPlaylist = 'rock';
        const audioPlayer = document.getElementById('audioPlayer');
        const trackList = document.getElementById('trackList');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingArtist = document.getElementById('nowPlayingArtist');
        const nowPlayingCover = document.getElementById('nowPlayingCover');

        // Загрузка плейлиста
        window.loadPlaylist = function(playlistName) {
            currentPlaylist = playlistName;
            
            document.querySelectorAll('.playlist-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderTracks(playlists[playlistName]);
        };

        // Отрисовка треков
        function renderTracks(tracks) {
            trackList.innerHTML = '';
            tracks.forEach((track, index) => {
                const trackElement = document.createElement('div');
                trackElement.className = 'track-item';
                trackElement.onclick = (e) => {
                    if (!e.target.classList.contains('play-btn')) {
                        playTrack(currentPlaylist, index);
                    }
                };
                trackElement.innerHTML = `
                    <div class="track-cover">${track.emoji || '🎵'}</div>
                    <div class="track-info">
                        <div class="track-name">${track.name}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                    <button class="play-btn" onclick="event.stopPropagation(); playTrack('${currentPlaylist}', ${index})">▶</button>
                `;
                trackList.appendChild(trackElement);
            });
        }

        // Проигрывание трека
        window.playTrack = function(playlistName, index) {
            const track = playlists[playlistName][index];
            audioPlayer.src = track.url;
            audioPlayer.play();
            
            nowPlayingTitle.textContent = track.name;
            nowPlayingArtist.textContent = track.artist;
            nowPlayingCover.textContent = track.emoji || '🎵';
            
            document.querySelectorAll('.play-btn').forEach((btn, i) => {
                if (i === index && playlistName === currentPlaylist) {
                    btn.innerHTML = '⏸';
                    btn.classList.add('playing');
                } else {
                    btn.innerHTML = '▶';
                    btn.classList.remove('playing');
                }
            });
        };

        audioPlayer.addEventListener('ended', function() {
            document.querySelectorAll('.play-btn').forEach(btn => {
                btn.innerHTML = '▶';
                btn.classList.remove('playing');
            });
            nowPlayingTitle.textContent = '—';
        });

        // Переключение темы
        window.setTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.includes(theme === 'dark' ? 'Тёмная' : 'Светлая')) {
                    btn.classList.add('active');
                }
            });
        };

        // Загружаем первый плейлист
        renderTracks(playlists.rock);
    </script>
</body>
</html>
